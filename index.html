<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q-Insight: Quantum Simulator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .app-container { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 1.8rem; color: var(--primary); font-weight: 600; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; color: var(--text-muted); font-size: 0.9rem; }
        .state-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; text-align: center; font-family: monospace; font-size: 1.3rem; margin-bottom: 25px; border: 1px solid rgba(56, 189, 248, 0.2); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .btn { background: #1e293b; color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
        .btn:hover { background: var(--primary); color: #0f172a; border-color: var(--primary); transform: translateY(-2px); }
        .btn-reset { grid-column: span 2; background: transparent; border: 1px dashed var(--text-muted); color: var(--text-muted); }
        .btn-reset:hover { background: #ef4444; color: white; border-color: #ef4444; }
        .chart { display: flex; justify-content: space-around; align-items: flex-end; height: 160px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .bar-group { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .bar-wrapper { width: 100%; height: 100px; background: rgba(0,0,0,0.2); border-radius: 6px; display: flex; align-items: flex-end; overflow: hidden; position: relative; }
        .bar { width: 100%; background: linear-gradient(to top, #0ea5e9, #38bdf8); border-radius: 6px; transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .label { margin-top: 12px; font-weight: 600; font-size: 1.1rem; }
        .prob { color: var(--primary); font-size: 0.9rem; margin-top: 4px; }
        .footer { margin-top: auto; padding-top: 25px; text-align: center; font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }
        .dev-name { color: var(--text-main); font-weight: 600; font-size: 0.9rem; margin-top: 5px; }
        .org-name { color: var(--primary); font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Q-Insight</h1>
            <p>1-Qubit State Simulator</p>
        </div>

        <div class="state-box" id="stateVector">
            |ψ⟩ = 1.000|0⟩ + 0.000|1⟩
        </div>

        <div class="controls">
            <button class="btn" onclick="applyGate('X')">X Gate (NOT)</button>
            <button class="btn" onclick="applyGate('H')">H Gate (Had)</button>
            <button class="btn btn-reset" onclick="resetState()">Reset State</button>
        </div>

        <div class="chart">
            <div class="bar-group">
                <div class="bar-wrapper"><div class="bar" id="bar0"></div></div>
                <div class="label">|0⟩</div>
                <div class="prob" id="prob0">100.0%</div>
            </div>
            <div class="bar-group">
                <div class="bar-wrapper"><div class="bar" id="bar1" style="height: 0%;"></div></div>
                <div class="label">|1⟩</div>
                <div class="prob" id="prob1">0.0%</div>
            </div>
        </div>

        <div class="footer">
            <div>Educational Technology Simulation</div>
            <div class="dev-name">ผศ.ดร.พิสิษฐ์ สุวรรณแพทย์</div>
            <div class="org-name">AGRICULTURE SILPAKORN</div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
